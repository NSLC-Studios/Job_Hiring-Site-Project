/* Fixed navbar */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  padding: 10px 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  z-index: 1000;
}

.nav-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* This makes the dropdown follow the button */
.menu-wrapper {
  position: relative;
  display: inline-block;
}

/* Dropdown always stays under the button */
.dropdown {
  position: absolute;
  top: 100%;   /* directly under the button */
  left: 0;     /* aligned with the button */
  background: white;
  display: flex;
  flex-direction: column;
  border: 1px solid #ddd;
}

.dropdown a {
  padding: 10px 15px;
  text-decoration: none;
  color: black;
}

.dropdown a:hover {
  background: #f2f2f2;
}

/* Hidden state */
.hidden {
  display: none;
}

/* Page content spacing so navbar doesn't overlap */
.content {
  padding-top: 80px;
}
