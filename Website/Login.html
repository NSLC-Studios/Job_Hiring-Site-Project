<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Today!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Styles/Base_Style.css">
    <link rel="stylesheet" href="/Styles/Login_Style.css">
</head>
<body class="darkmode_animation">
    <header>
        <nav class="navbar container">
            <div class="dark_nav container-fluid">
                <a class="navbar-brand dark_nav" href="/">
                    <img src="/Images/Icons/logo.ico" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
                    Job Hiring Site!
                </a>
                <div class="row">
                    <div class="col-sm-6 col-md-4 col-lg-2 ">
                        About Us
                    </div>
                    <div class="col-sm-6 col-md-4 col-lg-2">
                        idk yet
                    </div>
                    <div class="col-sm-6 col-md-4 col-lg-2">
                        About Us
                    </div>
                    <div id="form_switch_button" class="col-sm-6 col-md-4 col-lg-2" >
                        Log in
                    </div>
                    <div class="col-sm-6 col-md-4 col-lg-2">
                        Free Beer ?
                    </div>
                    <div class="col-sm-6 col-md-4 col-lg-2" id="mode_switch">
                        <img src="/Images/Vectors/light_dark_mode3.svg" class="img-fluid nav-icon" alt="Light / Dark Mode"></img>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    
    <main>
        <form id="sign_up" class="signup_login_window container dark dark_background center">
            <h2>Sign up</h2>
            <div class="row">
                <div class="col-sm-12 col-lg-12">
                    <label id="sign_warningbox" class="fs-2 warning hidden">The passwords do not match!</label>
                </div>
            </div>
            <div class="row">
                <label class="fs-4 form-label col-sm-12 col-lg-12">Come up with a fancy Username!</label>
                <div class="col-sm-12 col-lg-12">
                    <input class="form-control fs-4" type="text" id="sign_user" class="UserName" placeholder="UserName">
                </div>
            </div>
            <div class="row">
                <label class="fs-4 form-label col-sm-12 col-lg-12">You gotta access our site somehow!</label>
                <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4" type="password" id="sign_pass" placeholder="Password">
                </div>
                <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4" type="password" id="sign_repass" placeholder="Repeat Password">
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <button class="buttons btn btn-danger fs-3" id="sign_up_button">Sign up</button>
                </div>
            </div>
        </form>

        <form id="updateuser" class="hidden signup_login_window container dark dark_background center">
            <h2>Tell us about you!</h2>
            <div class="row">
                <div class="col-sm-12 col-lg-12">
                    <label id="upd_warningbox" class="fs-2 warning hidden">Please fill everything out...</label>
                </div>
            </div>
            <div class="row">
                <label class="fs-4 form-label col-sm-12 col-lg-12">How can we call you?</label>
                <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4" placeholder="Firstname" type="text" id="first_name" required>
                </div>
                <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4" placeholder="Lastname" type="text" id="last_name" required>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <button class="buttons btn btn-success fs-3" id="UpdateLegalName">Register Name</button>
                </div>
            </div>
            <br>
            <div class="row">
                <label class="fs-4 form-label col-sm-12 col-lg-12">It could never hurt to be reached out to!</label>
                <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4" type="text" id="phone" placeholder="+[123]45607890">
                </div>
                  <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4" type="email" id="email" placeholder="email@xyz.com">
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <button class="buttons btn btn-success fs-3" id="RegisterContacts">Register Contacts</button>
                </div>
            </div>
        </form>

        <form id="log_in" class="hidden signup_login_window container dark dark_background center">
                <h2>Log In</h2>
                <div class="row">
                    <div class="col-sm-12 col-lg-12">
                        <label id="log_warningbox" class="fs-2 warning hidden">Your username or password is incorrect!</label>
                    </div>
                </div>
                <div class="row">
                    <label class="fs-4 form-label col-sm-12 col-lg-12">We kinda need that to log you in...</label>
                    <div class="col-sm-12 ">
                        <input class="form-control fs-4" type="text" id="log_user" class="UserName" placeholder="UserName">
                    </div>
                </div>
                <div class="row">
                    <label class="fs-4 form-label col-sm-12 col-lg-12">It doesn't hurt to remember!</label>
                    <div class="col-sm-12 ">
                        <input class="form-control fs-4"  type="password" id="log_pass" placeholder="Password">
                    </div>
                    <label class="fs-4 form-label col-sm-12 col-lg-12">You can always ask for a new one <a href="/Contact">here!</a></label>
                </div>
                <div class="row">
                     <div class="col-sm-12">
                        <button class="buttons btn btn-danger fs-3 dt" id="log_in_button">Log in</button>
                    </div>
                </div>
        </form>
    </main>

    <footer class="universal_footer">

    </footer>
    <script src="/Scripts/Base_Script.js"></script>
    <script src="/Scripts/Login_Script.js"></script>
</body>
</html>
