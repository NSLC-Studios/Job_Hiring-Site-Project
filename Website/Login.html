<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="Styles/Base_Style.css">
    <title>Log-In Page</title>
</head>
<body class="darkmode_animation">
    <header class="universal_header dark_nav">
        <nav class="header_nav container">
            <ul class="row">
                <li class="col-sm-6 col-md-4 col-lg-2 ">
                    About Us
                </li>
                <li class="col-sm-6 col-md-4 col-lg-2">
                    idk yet
                </li>
                <li class="col-sm-6 col-md-4 col-lg-2">
                    About Us
                </li>
                <li class="col-sm-6 col-md-4 col-lg-2 form_switch_button" >
                    Log in
                </li>
                <li class="col-sm-6 col-md-4 col-lg-2">
                    Free Beer ?
                </li>
                <li class="col-sm-6 col-md-4 col-lg-2" id="mode_swich">
                    <img src="/Images/Vectors/light_dark_mode3.svg" class="img-fluid nav-icon" alt="Light / Dark Mode">
                    </img>
                </li>
            </ul>
        </nav>
    </header>
    
    <main>
        <form id="sign_up" class="signup_login_window container dark center">
            <h2>Sign up</h2>
            <div class="row">
                <label class="fs-4 label col-sm-12 col-lg-12">Come up with a fancy Username!</label>
                <div class="col-sm-12 col-lg-12">
                    <input class="form-control fs-4" type="text" id="sign_user" class="UserName" placeholder="UserName">
                </div>
            </div>
            <div class="row">
                <label class="fs-4 label col-sm-12 col-lg-12">You gotta access our site somehow!</label>
                <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4" type="password" id="sign_pass" placeholder="Password">
                </div>
                <div class="col-sm-12 col-lg-6"> 
                    <input class="form-control fs-4" type="password" id="sign_repass" placeholder="Repeat Password">
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <label class="buttons btn btn-danger fs-3" id="sign_up_button">Sign up</label>
                </div>
            </div>
        </form>

        <form id="UpdateUser" class="signup_login_window container dark center">
            <h2>Tell us about you!</h2>
            <div class="row">
                <label class="fs-4 form-label col-sm-12 col-lg-12">It could never hurt to be reached out to!</label>
                <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4" placeholder="Firstname" type="text" id="first_name" required>
                </div>
                <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4" placeholder="Lastname" type="text" id="last_name" required>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <button class="buttons btn btn-success fs-3" id="UpdateLegalName">Register Name</button>
                </div>
            </div>
            <br>
            <div class="row">
                <label class="fs-4 form-label col-sm-12 col-lg-12">It could never hurt to be reached out to!</label>
                <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4"  type="text" class="Phone" placeholder="+[123]45607890">
                </div>
                  <div class="col-sm-12 col-lg-6">
                    <input class="form-control fs-4"  type="email" id="email" placeholder="email@xyz.com">
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <button class="buttons btn btn-success fs-3" id="RegisterContacts">Register Contacts</button>
                </div>
            </div>
        </form>

        <form id="log_in" class="signup_login_window container dark center">
                <h2>Log In</h2>
                <div class="row">
                    <label class="fs-4 form-label col-sm-12 col-lg-12">We kinda need that to log you in...</label>
                    <div class="col-sm-12 ">
                        <input class="form-control fs-4" type="text" id="log_user" class="UserName" placeholder="UserName">
                    </div>
                </div>
                <div class="row">
                    <label class="fs-4 form-label col-sm-12 col-lg-12">It doesn't hurt to remember!</label>
                    <div class="col-sm-12 ">
                        <input class="form-control fs-4"  type="password" id="log_pass" placeholder="Password">
                    </div>
                    <label class="fs-4 form-label col-sm-12 col-lg-12">You can always ask for a new one <a href="Contact">here!</a></label>
                </div>
                <div class="row">
                     <div class="col-sm-12">
                        <button class="buttons btn btn-danger fs-3 dt" id="log_in_button">Log in</button>
                    </div>
                </div>
        </form>
    </main>

    <footer class="universal_footer">

    </footer>
    <script src="Scripts/Login_Script.js"></script>
</body>
</html>
